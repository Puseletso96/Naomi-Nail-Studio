    <h1>Naomi Nail Studio</h1>
    <h2>Enquiry Form</h2>

    <p>Please fill in the form below to make an enquiry about our services.</p>

    <form>

        <p>
            <label>Full Name:</label><br>
            <input type="text" name="fullname">
        </p>

        <p>
            <label>Email Address:</label><br>
            <input type="email" name="email">
        </p>

        <p>
            <label>Phone Number:</label><br>
            <input type="tel" name="phone">
        </p>

        <p>
            <label>Select Service:</label><br>
            <select name="service">
                <option>Manicure</option>
                <option>Pedicure</option>
                <option>polygel-based Nails</option>
                <option>Gel Nails</option>
                <option>Nail Art</option>
            </select>
        </p>

        <p>
            <label>Preferred Date:</label><br>
            <input type="date" name="date">
        </p>

        <p>
            <label>Your Message:</label><br>
            <textarea name="message" rows="5" cols="30"></textarea>
        </p>

        <p>
            <input type="submit" value="Submit Enquiry">
            <input type="reset" value="Clear Form">
        </p>

    </form>
